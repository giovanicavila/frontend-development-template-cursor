name: Dependabot Semver Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  label-semver:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Apply semver label based on version bump
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;

            // Dependabot title format:
            // "Bump <package> from <old> to <new>"
            // "Bump <group> from <old> to <new> in /<dir>"
            const match = title.match(
              /[Bb]ump .+ from (\d+)\.(\d+)\.(\d+) to (\d+)\.(\d+)\.(\d+)/
            );

            if (!match) {
              console.log(`Title did not match semver pattern: "${title}"`);
              return;
            }

            const [, oldMajor, oldMinor, oldPatch, newMajor, newMinor, newPatch] =
              match.map((v, i) => (i === 0 ? v : Number(v)));

            let label;
            if (newMajor > oldMajor) {
              label = "major";
            } else if (newMinor > oldMinor) {
              label = "minor";
            } else if (newPatch > oldPatch) {
              label = "patch";
            } else {
              console.log("Could not determine semver bump type.");
              return;
            }

            console.log(`Detected bump type: ${label}`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });

            console.log(`Label "${label}" applied to PR #${context.payload.pull_request.number}`);
